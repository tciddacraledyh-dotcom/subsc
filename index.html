<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="サブスク">
<meta name="theme-color" content="#4338CA">
<title>サブスク管理</title>
<style>
  :root{
    --indigo:#4338CA; --indigo-light:#6366F1; --indigo-soft:#EEF0FB;
    --bg:#F3F4F6; --card:#FFFFFF; --ink:#1F2937; --muted:#9CA3AF; --line:#E5E7EB;
    --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); overscroll-behavior-y:none;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  input,select{font-family:inherit; font-size:17px;}

  /* ---- shell ---- */
  #app{display:flex; flex-direction:column; height:100dvh;}
  header{
    padding:calc(var(--safe-top) + 14px) 20px 14px; background:#fff;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); position:relative; z-index:5;
  }
  header h1{font-size:19px; font-weight:700; margin:0;}
  .icon-btn{width:34px; height:34px; display:flex; align-items:center; justify-content:center; color:#374151; font-size:20px;}
  main{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:24px;}
  .page{display:none; padding:18px 16px;}
  .page.active{display:block;}

  /* ---- home ---- */
  .summary{
    background:linear-gradient(135deg,var(--indigo),var(--indigo-light));
    color:#fff; border-radius:20px; padding:22px 22px 20px; margin-bottom:18px;
    box-shadow:0 8px 22px rgba(67,56,202,.22);
  }
  .summary .label{font-size:13px; opacity:.85; margin-bottom:4px;}
  .summary .total{font-size:34px; font-weight:700; letter-spacing:-.5px;}
  .summary .total span{font-size:18px; font-weight:600; margin-left:2px;}
  .summary .sub{font-size:13px; opacity:.85; margin-top:8px;}

  .card{
    background:var(--card); border-radius:16px; padding:15px 16px; margin-bottom:11px;
    display:flex; align-items:center; gap:13px; box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .card:active{background:#fafafa;}
  .avatar{
    width:44px; height:44px; border-radius:12px; flex:0 0 auto; color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px;
  }
  .card .info{flex:1; min-width:0;}
  .card .name{font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card .meta{font-size:12.5px; color:var(--muted); margin-top:3px;}
  .card .price{text-align:right;}
  .card .price .amt{font-size:16px; font-weight:700;}
  .card .price .cyc{font-size:11px; color:var(--muted); margin-top:2px;}

  .empty{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#6b7280; font-size:17px; line-height:1.8;
    height:60dvh; font-weight:600;
  }
  .empty small{display:block; color:var(--muted); font-weight:400; font-size:14px; margin-top:10px;}

  /* ---- analysis ---- */
  .stat-row{display:flex; gap:11px; margin-bottom:18px;}
  .stat{flex:1; background:#fff; border-radius:16px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .stat .k{font-size:12px; color:var(--muted);}
  .stat .v{font-size:23px; font-weight:700; margin-top:5px;}
  .section-title{font-size:14px; font-weight:700; color:#374151; margin:6px 2px 12px;}
  .bar-item{margin-bottom:14px;}
  .bar-head{display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:6px;}
  .bar-head .nm{font-weight:600;}
  .bar-head .vl{color:var(--muted);}
  .bar-track{height:9px; background:#E9EAF5; border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--indigo); border-radius:6px;}

  /* ---- calendar ---- */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .cal-head .m{font-size:17px; font-weight:700;}
  .cal-nav{width:34px; height:34px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--indigo); box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; background:#fff; border-radius:16px; padding:12px; box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .cal-dow{text-align:center; font-size:11px; color:var(--muted); padding:4px 0;}
  .cal-cell{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:9px; font-size:13.5px; position:relative;}
  .cal-cell.today{background:var(--indigo-soft); font-weight:700; color:var(--indigo);}
  .cal-cell.has::after{content:""; width:5px; height:5px; border-radius:50%; background:var(--indigo); position:absolute; bottom:5px;}
  .cal-cell.muted{color:#d1d5db;}
  .upcoming{margin-top:20px;}

  /* ---- history ---- */
  .hist-day{font-size:13px; color:var(--muted); margin:18px 2px 9px; font-weight:600;}
  .hist-item{background:#fff; border-radius:14px; padding:13px 15px; margin-bottom:8px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .hist-item .nm{flex:1; font-weight:600; font-size:15px;}
  .hist-item .am{font-weight:700;}

  /* ---- fab + tabbar ---- */
  .fab{
    position:fixed; right:20px; bottom:calc(var(--safe-bottom) + 84px);
    width:60px; height:60px; border-radius:50%; background:var(--indigo); color:#fff;
    font-size:30px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(67,56,202,.4); z-index:20;
  }
  .fab:active{transform:scale(.94);}
  .tabbar{
    display:flex; background:#fff; border-top:1px solid var(--line);
    padding:8px 0 calc(var(--safe-bottom) + 8px); position:relative; z-index:10;
  }
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:10.5px;}
  .tab svg{width:23px; height:23px;}
  .tab.active{color:var(--indigo);}

  /* ---- sheet (add/edit) ---- */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .25s; z-index:30;}
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; background:#fff;
    border-radius:22px 22px 0 0; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1);
    z-index:31; max-height:92dvh; display:flex; flex-direction:column; padding-bottom:var(--safe-bottom);
  }
  .sheet.show{transform:translateY(0);}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 6px;}
  .sheet-head .t{font-size:17px; font-weight:700;}
  .sheet-head .x{font-size:22px; color:#6b7280; width:30px; height:30px;}
  .sheet-body{overflow-y:auto; padding:8px 20px 16px;}
  .field{margin-top:18px;}
  .field > label{display:block; font-size:14px; font-weight:700; margin-bottom:9px;}
  .field input[type=text], .field input[type=url], .field select, .field textarea, .field input[type=date]{
    width:100%; border:none; border-bottom:1.5px solid var(--line); padding:8px 2px;
    background:transparent; outline:none; color:var(--ink);
  }
  .field select{appearance:none; -webkit-appearance:none;}
  .field textarea{resize:none; min-height:54px; border:1.5px solid var(--line); border-radius:12px; padding:10px;}
  .price-field{display:flex; align-items:center; gap:14px;}
  .yen{width:54px; height:48px; border-radius:12px; background:var(--indigo-soft); color:var(--indigo); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700;}
  .price-field input{flex:1; font-size:22px; border:none; border-bottom:1.5px solid var(--line); padding:8px 2px; outline:none;}
  .submit{
    margin:14px 20px calc(var(--safe-bottom) + 14px); padding:17px; border-radius:30px;
    background:var(--indigo); color:#fff; font-size:17px; font-weight:700; text-align:center;
  }
  .submit:active{opacity:.85;}
  .delete-btn{display:block; width:100%; text-align:center; color:#DC2626; font-size:15px; font-weight:600; padding:14px; margin-top:8px;}
  .menu-item{padding:16px 8px; font-size:16px; border-bottom:1px solid var(--line);}
  .menu-item:last-child{border:none;}
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="icon-btn" onclick="openSheet('settings')">⚙︎</button>
    <h1 id="pageTitle">サブスクリプション</h1>
    <button class="icon-btn" onclick="exportData()">⋯</button>
  </header>

  <main>
    <section id="home" class="page active"></section>
    <section id="analysis" class="page"></section>
    <section id="calendar" class="page"></section>
    <section id="history" class="page"></section>
  </main>

  <button class="fab" onclick="openSheet('add')">＋</button>

  <nav class="tabbar">
    <button class="tab active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>ホーム</button>
    <button class="tab" data-tab="analysis" onclick="switchTab('analysis')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 12V3a9 9 0 0 1 9 9z" fill="currentColor" stroke="none"/></svg>分析</button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>カレンダー</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V9M12 21V4M19 21v-7"/></svg>支払い履歴</button>
  </nav>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
const CYCLES = {
  weekly:    {label:"毎週",      perYear:52,  addMonths:0, addDays:7},
  monthly:   {label:"1ヶ月に1回", perYear:12,  addMonths:1, addDays:0},
  quarterly: {label:"3ヶ月に1回", perYear:4,   addMonths:3, addDays:0},
  semi:      {label:"6ヶ月に1回", perYear:2,   addMonths:6, addDays:0},
  yearly:    {label:"1年に1回",   perYear:1,   addMonths:12,addDays:0},
};
const COLORS = ["#4338CA","#0EA5E9","#F59E0B","#EC4899","#10B981","#8B5CF6","#EF4444","#14B8A6"];
const STORE_KEY = "subsc.v1";

let subs = load();
let calMonth = startOfMonth(new Date());

function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }catch(e){ return []; } }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(subs)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function monthlyAmount(s){ return s.fee * CYCLES[s.cycle].perYear / 12; }
function yen(n){ return "¥" + Math.round(n).toLocaleString("ja-JP"); }
function colorFor(s){ return COLORS[ (s.name.charCodeAt(0)||0) % COLORS.length ]; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function ymd(d){ return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function advance(date, cycle){
  const c = CYCLES[cycle], d = new Date(date);
  if(c.addDays) d.setDate(d.getDate()+c.addDays);
  else d.setMonth(d.getMonth()+c.addMonths);
  return d;
}
function nextPayment(s){
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(s.firstDate); d.setHours(0,0,0,0);
  let guard=0;
  while(d < today && guard++ < 1000) d = advance(d, s.cycle);
  return d;
}
function occurrencesBetween(s, from, to){
  let d = new Date(s.firstDate); d.setHours(0,0,0,0);
  const out=[], guard=2000; let i=0;
  while(d < from && i++ < guard) d = advance(d, s.cycle);
  i=0;
  while(d <= to && i++ < guard){ out.push(new Date(d)); d = advance(d, s.cycle); }
  return out;
}

/* ---------- rendering ---------- */
function renderAll(){ renderHome(); renderAnalysis(); renderCalendar(); renderHistory(); }

function renderHome(){
  const el = document.getElementById("home");
  if(subs.length===0){
    el.innerHTML = `<div class="empty">右下のプラスボタンから<br>サブスクリプションを追加できます</div>`;
    return;
  }
  const totalM = subs.reduce((a,s)=>a+monthlyAmount(s),0);
  const sorted = [...subs].sort((a,b)=> nextPayment(a)-nextPayment(b));
  let html = `
    <div class="summary">
      <div class="label">今月の合計</div>
      <div class="total">${yen(totalM)}<span>/月</span></div>
      <div class="sub">年間 ${yen(totalM*12)} ・ ${subs.length}件のサブスク</div>
    </div>`;
  for(const s of sorted){
    const np = nextPayment(s);
    html += `
      <div class="card" onclick="openSheet('edit','${s.id}')">
        <div class="avatar" style="background:${colorFor(s)}">${s.name.charAt(0)}</div>
        <div class="info">
          <div class="name">${esc(s.name)}</div>
          <div class="meta">次回 ${ymd(np)}${s.category? " ・ "+esc(s.category):""}</div>
        </div>
        <div class="price">
          <div class="amt">${yen(s.fee)}</div>
          <div class="cyc">${CYCLES[s.cycle].label}</div>
        </div>
      </div>`;
  }
  el.innerHTML = html;
}

function renderAnalysis(){
  const el = document.getElementById("analysis");
  if(subs.length===0){ el.innerHTML = `<div class="empty">データがありません</div>`; return; }
  const totalM = subs.reduce((a,s)=>a+monthlyAmount(s),0);
  const byCat = {};
  for(const s of subs){ const c = s.category||"未分類"; byCat[c]=(byCat[c]||0)+monthlyAmount(s); }
  const cats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(...cats.map(c=>c[1]));
  let html = `
    <div class="stat-row">
      <div class="stat"><div class="k">月額合計</div><div class="v">${yen(totalM)}</div></div>
      <div class="stat"><div class="k">年額合計</div><div class="v">${yen(totalM*12)}</div></div>
    </div>
    <div class="section-title">カテゴリー別（月額）</div>`;
  for(const [c,v] of cats){
    html += `
      <div class="bar-item">
        <div class="bar-head"><span class="nm">${esc(c)}</span><span class="vl">${yen(v)}（${Math.round(v/totalM*100)}%）</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div>
      </div>`;
  }
  el.innerHTML = html;
}

function renderCalendar(){
  const el = document.getElementById("calendar");
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const first = new Date(y,m,1), startDow = first.getDay();
  const days = new Date(y,m+1,0).getDate();
  const today = new Date();
  const payDays = {};
  for(const s of subs){
    const np = nextPayment(s);
    // gather all occurrences this month
    occurrencesBetween(s, new Date(y,m,1), new Date(y,m,days)).forEach(d=>{
      (payDays[d.getDate()] = payDays[d.getDate()]||[]).push(s);
    });
  }
  const dow = ["日","月","火","水","木","金","土"];
  let cells = "";
  dow.forEach(d=> cells += `<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell muted"></div>`;
  for(let d=1; d<=days; d++){
    const isToday = sameDay(new Date(y,m,d), today);
    const has = payDays[d];
    cells += `<div class="cal-cell ${isToday?'today':''} ${has?'has':''}">${d}</div>`;
  }
  // upcoming list (next 45 days)
  const from = new Date(); from.setHours(0,0,0,0);
  const to = new Date(from); to.setDate(to.getDate()+45);
  let up = [];
  for(const s of subs) occurrencesBetween(s, from, to).forEach(d=> up.push({s,d}));
  up.sort((a,b)=>a.d-b.d);
  let upHtml = "";
  for(const {s,d} of up.slice(0,12)){
    upHtml += `<div class="hist-item"><div class="avatar" style="width:36px;height:36px;font-size:15px;background:${colorFor(s)}">${s.name.charAt(0)}</div><div class="nm">${esc(s.name)}<div style="font-size:12px;color:var(--muted);font-weight:400">${ymd(d)}</div></div><div class="am">${yen(s.fee)}</div></div>`;
  }
  el.innerHTML = `
    <div class="cal-head">
      <button class="cal-nav" onclick="calMonth=new Date(${y},${m-1},1);renderCalendar()">‹</button>
      <div class="m">${y}年 ${m+1}月</div>
      <button class="cal-nav" onclick="calMonth=new Date(${y},${m+1},1);renderCalendar()">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="upcoming">
      <div class="section-title">今後の支払い</div>
      ${upHtml || '<div style="color:var(--muted);font-size:14px;padding:8px 2px">予定はありません</div>'}
    </div>`;
}

function renderHistory(){
  const el = document.getElementById("history");
  const today = new Date(); today.setHours(0,0,0,0);
  const from = new Date(today); from.setMonth(from.getMonth()-12);
  let items = [];
  for(const s of subs) occurrencesBetween(s, from, today).forEach(d=> items.push({s,d}));
  items.sort((a,b)=> b.d-a.d);
  if(items.length===0){ el.innerHTML = `<div class="empty">支払い履歴はまだありません</div>`; return; }
  let html = "", curKey="";
  for(const {s,d} of items){
    const key = d.getFullYear()+"年"+(d.getMonth()+1)+"月";
    if(key!==curKey){ html += `<div class="hist-day">${key}</div>`; curKey=key; }
    html += `<div class="hist-item"><div class="avatar" style="width:36px;height:36px;font-size:15px;background:${colorFor(s)}">${s.name.charAt(0)}</div><div class="nm">${esc(s.name)}<div style="font-size:12px;color:var(--muted);font-weight:400">${d.getMonth()+1}月${d.getDate()}日</div></div><div class="am">${yen(s.fee)}</div></div>`;
  }
  el.innerHTML = html;
}

/* ---------- tabs ---------- */
const TITLES = {home:"サブスクリプション",analysis:"分析",calendar:"カレンダー",history:"支払い履歴"};
function switchTab(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(name).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.tab===name));
  document.getElementById("pageTitle").textContent = TITLES[name];
  document.querySelector("main").scrollTop = 0;
}

/* ---------- sheet ---------- */
function openSheet(mode, id){
  const sheet = document.getElementById("sheet");
  if(mode==="settings"){ sheet.innerHTML = settingsHTML(); }
  else { sheet.innerHTML = formHTML(mode, id); }
  document.getElementById("overlay").classList.add("show");
  sheet.classList.add("show");
}
function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("sheet").classList.remove("show");
}

function formHTML(mode, id){
  const s = mode==="edit" ? subs.find(x=>x.id===id) : null;
  const today = new Date().toISOString().slice(0,10);
  const cycleOpts = Object.entries(CYCLES).map(([k,v])=>
    `<option value="${k}" ${s&&s.cycle===k?"selected":(!s&&k==="monthly"?"selected":"")}>${v.label}</option>`).join("");
  return `
    <div class="sheet-head">
      <button class="x" onclick="closeSheet()">✕</button>
      <span class="t">${s?"編集":"追加"}</span>
      <span style="width:30px"></span>
    </div>
    <div class="sheet-body">
      <div class="field"><label>サービス名</label>
        <input type="text" id="f-name" placeholder="Apple Music" value="${s?esc(s.name):""}"></div>
      <div class="field"><label>支払い周期</label>
        <select id="f-cycle">${cycleOpts}</select></div>
      <div class="field"><label>料金</label>
        <div class="price-field"><div class="yen">¥</div>
          <input type="number" inputmode="numeric" id="f-fee" placeholder="500" value="${s?s.fee:""}"></div></div>
      <div class="field"><label>初回支払い日</label>
        <input type="date" id="f-date" value="${s?s.firstDate:today}"></div>
      <div class="field"><label>カテゴリー</label>
        <input type="text" id="f-cat" placeholder="音楽 / 動画 / 仕事など" value="${s?esc(s.category||""):""}"></div>
      <div class="field"><label>支払い方法</label>
        <input type="text" id="f-pay" placeholder="クレジットカードなど" value="${s?esc(s.payment||""):""}"></div>
      <div class="field"><label>URL</label>
        <input type="url" id="f-url" placeholder="https://" value="${s?esc(s.url||""):""}"></div>
      <div class="field"><label>メモ</label>
        <textarea id="f-memo" placeholder="解約方法など">${s?esc(s.memo||""):""}</textarea></div>
    </div>
    <div class="submit" onclick="saveForm('${s?s.id:""}')">${s?"更新":"登録"}</div>
    ${s?`<button class="delete-btn" onclick="removeSub('${s.id}')">削除する</button>`:""}
  `;
}

function saveForm(id){
  const name = document.getElementById("f-name").value.trim();
  const fee = parseFloat(document.getElementById("f-fee").value);
  if(!name){ alert("サービス名を入力してください"); return; }
  if(isNaN(fee) || fee<0){ alert("料金を入力してください"); return; }
  const data = {
    name, fee,
    cycle: document.getElementById("f-cycle").value,
    firstDate: document.getElementById("f-date").value,
    category: document.getElementById("f-cat").value.trim(),
    payment: document.getElementById("f-pay").value.trim(),
    url: document.getElementById("f-url").value.trim(),
    memo: document.getElementById("f-memo").value.trim(),
  };
  if(id){ const i=subs.findIndex(x=>x.id===id); subs[i]={...subs[i],...data}; }
  else { subs.push({id:uid(),...data}); }
  save(); renderAll(); closeSheet();
}

function removeSub(id){
  if(!confirm("このサブスクを削除しますか？")) return;
  subs = subs.filter(x=>x.id!==id);
  save(); renderAll(); closeSheet();
}

function settingsHTML(){
  return `
    <div class="sheet-head">
      <button class="x" onclick="closeSheet()">✕</button>
      <span class="t">設定</span><span style="width:30px"></span>
    </div>
    <div class="sheet-body">
      <div class="menu-item" onclick="exportData()">📤 データを書き出す（バックアップ）</div>
      <div class="menu-item" onclick="document.getElementById('importFile').click()">📥 データを読み込む</div>
      <div class="menu-item" style="color:#DC2626" onclick="if(confirm('すべてのデータを削除しますか？')){subs=[];save();renderAll();closeSheet();}">🗑 すべて削除</div>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      <p style="color:var(--muted);font-size:12.5px;margin-top:20px;line-height:1.7">データはこの端末内にのみ保存されます。機種変更や念のためのバックアップには「書き出す」を使ってください。</p>
    </div>`;
}

function exportData(){
  const blob = new Blob([JSON.stringify(subs,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "subsc-backup.json"; a.click();
  URL.revokeObjectURL(url);
}
function importData(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ const d=JSON.parse(r.result); if(Array.isArray(d)){ subs=d; save(); renderAll(); closeSheet(); alert("読み込みました"); } }catch(err){ alert("ファイルを読めませんでした"); } };
  r.readAsText(file);
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

renderAll();
</script>
</body>
</html>
